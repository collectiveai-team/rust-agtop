name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: test
        run: cargo test --all

  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin agtop
      - name: Rename binary
        run: cp target/release/agtop agtop-x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: agtop-x86_64-unknown-linux-gnu
          path: agtop-x86_64-unknown-linux-gnu

  build-macos-x86:
    name: Build (macOS x86_64)
    runs-on: macos-13
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin agtop
      - name: Rename binary
        run: cp target/release/agtop agtop-x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: agtop-x86_64-apple-darwin
          path: agtop-x86_64-apple-darwin

  build-macos-arm:
    name: Build (macOS ARM)
    runs-on: macos-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin agtop
      - name: Rename binary
        run: cp target/release/agtop agtop-aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: agtop-aarch64-apple-darwin
          path: agtop-aarch64-apple-darwin

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-x86, build-macos-arm]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agtop-x86_64-unknown-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: agtop-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: agtop-aarch64-apple-darwin

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### macOS (Apple Silicon)
            ```sh
            curl -Lo agtop https://github.com/collectiveai-team/rust-agtop/releases/download/${{ github.ref_name }}/agtop-aarch64-apple-darwin
            chmod +x agtop && sudo mv agtop /usr/local/bin/
            ```

            ### macOS (Intel)
            ```sh
            curl -Lo agtop https://github.com/collectiveai-team/rust-agtop/releases/download/${{ github.ref_name }}/agtop-x86_64-apple-darwin
            chmod +x agtop && sudo mv agtop /usr/local/bin/
            ```

            ### Linux x86_64
            ```sh
            curl -Lo agtop https://github.com/collectiveai-team/rust-agtop/releases/download/${{ github.ref_name }}/agtop-x86_64-unknown-linux-gnu
            chmod +x agtop && sudo mv agtop /usr/local/bin/
            ```

            ### From source (cargo)
            ```sh
            cargo install --git https://github.com/collectiveai-team/rust-agtop --tag ${{ github.ref_name }} agtop-cli
            ```

          files: |
            agtop-x86_64-unknown-linux-gnu
            agtop-x86_64-apple-darwin
            agtop-aarch64-apple-darwin
